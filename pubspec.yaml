name: meetflow_ai
description: MeetFlow AI - AI-powered meeting documentation and task management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.0
  firebase_auth: ^5.6.1
  cloud_firestore: ^5.6.10

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # AI
  google_generative_ai: ^0.4.7

  # File Handling
  file_picker: ^8.3.7
  path_provider: ^2.1.5
  path: ^1.9.1
  mime: ^2.0.0

  # HTTP
  http: ^1.4.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.6

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.2

dependency_overrides:
  firebase_core_platform_interface: 6.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
